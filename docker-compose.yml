services:
  mysql:
    image: mysql:8.0
    container_name: campus-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: campus-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: campus-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${CAMPUS_RABBITMQ_USERNAME:-admin}
      RABBITMQ_DEFAULT_PASS: ${CAMPUS_RABBITMQ_PASSWORD:-admin}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./campus-server
    container_name: campus-backend
    ports:
      - "8080:8080"
    environment:
      MYSQL_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_ADMIN_SECRET_KEY: ${JWT_ADMIN_SECRET_KEY}
      JWT_USER_SECRET_KEY: ${JWT_USER_SECRET_KEY}
      JWT_ADMIN_TTL: ${JWT_ADMIN_TTL:-72000000000}
      JWT_USER_TTL: ${JWT_USER_TTL:-72000000000}
      JWT_ADMIN_TOKEN_NAME: ${JWT_ADMIN_TOKEN_NAME:-token}
      JWT_USER_TOKEN_NAME: ${JWT_USER_TOKEN_NAME:-authentication}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  frontend:
    build: ./campus-trading-client
    container_name: campus-frontend
    ports:
      - "90:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data:
